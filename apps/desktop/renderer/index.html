<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AiFarcaster Desktop</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p { color: #a1a1aa; margin-bottom: 2rem; }
    a { color: #9333ea; text-decoration: none; border: 1px solid #9333ea; padding: 0.75rem 1.5rem; border-radius: 8px; transition: all 0.2s; }
    a:hover { background: #9333ea; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🤖</div>
    <h1>AiFarcaster Desktop</h1>
    <p>Connect to your AiFarcaster instance to get started.</p>
    <a href="https://aifarcasters.xyz" target="_blank">Open Web App</a>
  </div>
</body>
</html>
